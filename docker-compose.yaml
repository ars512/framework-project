services:
  db:
    image: postgres:15-alpine
    container_name: shop_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: shop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: shop_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "host=db user=postgres password=123 dbname=shop port=5432 sslmode=disable TimeZone=Asia/Almaty"
      MIGRATION_URL: "postgres://postgres:123@db:5432/shop?sslmode=disable"
    depends_on:
      - db

volumes:
  postgres_data: